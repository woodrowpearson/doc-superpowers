# doc-superpowers workflow v1
# AI-powered PR documentation review with @claude interactive support
# Installed by doc-superpowers hooks installer

name: Doc Review (AI)

on:
  pull_request:
    branches: [__BASE_BRANCH__]
    types: [opened, synchronize]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'scripts/**'
      - '*.md'
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:

concurrency:
  group: doc-review-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

env:
  DOC_SUPERPOWERS_VERSION: "__VERSION__"

jobs:
  review-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review PR documentation
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          prompt: |
            Run /doc-superpowers review-pr to analyze the documentation impact
            of this pull request. Post findings as a PR comment with severity
            ratings (P0-P3).

            This is a read-only review — do not modify any files.
